<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    
    <!-- Neon Cyan-Blue Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <!-- Skin Tone Shadow Gradient -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>

    <!-- Hair Gradient -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Suit Gradient -->
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Glowing Effect Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="url(#primaryGrad)" stroke-width="3"/>

  <!-- Tech grid background detail -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="70" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5 5"/>
    <circle cx="100" cy="100" r="50" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="100" y1="10" x2="100" y2="190" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5 5"/>
    <line x1="10" y1="100" x2="190" y2="100" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5 5"/>
  </g>

  <!-- Profile avatar elements -->
  <!-- Shoulders / Suit -->
  <path d="M45,160 C45,135 60,120 100,120 C140,120 155,135 155,160 L155,185 L45,185 Z" fill="url(#suitGrad)"/>
  
  <!-- Tie / Inner Shirt -->
  <path d="M92,120 L108,120 L105,150 L95,150 Z" fill="#ffffff"/>
  <path d="M96,120 L104,120 L102,145 L98,145 Z" fill="url(#primaryGrad)"/>

  <!-- Suit Collar / Lapels -->
  <path d="M65,120 L88,145 L93,120 Z" fill="#334155"/>
  <path d="M135,120 L112,145 L107,120 Z" fill="#334155"/>

  <!-- Neck -->
  <path d="M85,90 C85,115 115,115 115,90 L115,122 L85,122 Z" fill="url(#skinGrad)"/>

  <!-- Head / Face -->
  <path d="M68,75 C68,45 132,45 132,75 C132,105 68,105 68,75 Z" fill="url(#skinGrad)"/>

  <!-- Hair (Neat & Modern Corporate style) -->
  <path d="M66,70 C62,55 75,40 100,38 C125,40 138,55 134,70 C132,58 128,48 118,48 C108,48 108,52 98,48 C88,44 76,52 66,70 Z" fill="url(#hairGrad)"/>
  
  <!-- Sleek Glasses (Tech CEO look) -->
  <g stroke="url(#primaryGrad)" stroke-width="2.5" fill="none" opacity="0.9" filter="url(#neonGlow)">
    <!-- Left frame -->
    <rect x="76" y="65" width="20" height="12" rx="3"/>
    <!-- Right frame -->
    <rect x="104" y="65" width="20" height="12" rx="3"/>
    <!-- Bridge -->
    <line x1="96" y1="71" x2="104" y2="71"/>
    <!-- Temples -->
    <path d="M76,68 L70,68"/>
    <path d="M124,68 L130,68"/>
  </g>

  <!-- Glowing HUD target indicators -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="10 30" opacity="0.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="40 120" opacity="0.6" filter="url(#neonGlow)"/>
</svg>
