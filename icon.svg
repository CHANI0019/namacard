<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Main Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Secondary Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glowing Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#neonGrad)" stroke-width="3" stroke-dasharray="10 40" opacity="0.3"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="80 180" opacity="0.4" filter="url(#glow)"/>

  <!-- Logo Icon: Stylized Geometric "D" + Network Blockchain Node connection -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Base Node Connections (Blockchain theme) -->
    <path d="M 40 40 L 216 40 L 216 216 L 40 216 Z" fill="none" stroke="#1e293b" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Stylized D shape -->
    <path d="M 50 30 
             L 140 30 
             A 90 90 0 0 1 230 120 
             A 90 90 0 0 1 140 210 
             L 50 210 
             Z" 
          fill="none" 
          stroke="url(#neonGrad)" 
          stroke-width="24" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>

    <!-- Inner Stablecoin / Asset design (Linked loops) -->
    <path d="M 90 80 
             L 130 80 
             A 40 40 0 0 1 170 120 
             A 40 40 0 0 1 130 160 
             L 90 160 
             Z" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="16" 
          stroke-linejoin="round"/>

    <!-- Connecting network nodes -->
    <circle cx="50" cy="30" r="14" fill="#ffffff" stroke="url(#neonGrad)" stroke-width="6"/>
    <circle cx="50" cy="210" r="14" fill="#ffffff" stroke="url(#neonGrad)" stroke-width="6"/>
    <circle cx="140" cy="30" r="14" fill="#ffffff" stroke="url(#neonGrad)" stroke-width="6"/>
    <circle cx="140" cy="210" r="14" fill="#ffffff" stroke="url(#neonGrad)" stroke-width="6"/>
    <circle cx="230" cy="120" r="16" fill="#ffffff" stroke="url(#accentGrad)" stroke-width="6"/>
    <circle cx="130" cy="120" r="12" fill="#ffffff" stroke="url(#neonGrad)" stroke-width="4"/>
  </g>

  <!-- Title Text under logo (Optional, logo only is fine, but adds premium feel) -->
  <text x="256" y="445" font-family="'Pretendard', 'Inter', sans-serif" font-weight="900" font-size="36" fill="#ffffff" letter-spacing="12" text-anchor="middle">
    DANARI
  </text>
</svg>
